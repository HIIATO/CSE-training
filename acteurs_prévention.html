  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rue }}\">\n      <div data-screen-label=\"Accueil\" style=\"flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:40px 28px 30px;background:linear-gradient(168deg,#07151f 0%,#0a3147 56%,#0d4d6e 100%);color:#fff;overflow-y:auto;\">\n        <div style=\"padding-top:18px;\">\n          <img src=\"a0426a0f-b2d6-420b-9edc-e1dd7772ce1e\" alt=\"Hiiato\" style=\"height:30px;display:block;\">\n        <\u002Fdiv>\n        <div>\n          <image-slot id=\"home-hero\" src=\"{{ homeHeroSrc }}\" shape=\"rounded\" radius=\"18\" placeholder=\"Visuel d'accueil (optionnel)\" style=\"display:block;width:100%;height:150px;margin-bottom:22px;\"><\u002Fimage-slot>\n          <div style=\"font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--c-blue-light);font-weight:600;margin-bottom:14px;\">Formation CSE / SSCT<\u002Fdiv>\n          <h1 style=\"margin:0;font-size:36px;line-height:1.08;font-weight:700;letter-spacing:-.01em;text-wrap:balance;\">Les acteurs de la prévention<\u002Fh1>\n          <p style=\"margin:14px 0 0;font-size:16px;line-height:1.55;color:rgba(255,255,255,.78);max-width:32ch;\">Face à chaque situation, désignez le bon acteur à mobiliser — et découvrez sa fiche.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;gap:18px;margin-bottom:4px;\">\n            <div><div style=\"font-size:26px;font-weight:700;color:#fff;\">{{ caseTotal }}<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(255,255,255,.6);\">situations<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:26px;font-weight:700;color:#fff;\">12<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(255,255,255,.6);\">acteurs à mobiliser<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ goCases }}\" style=\"width:100%;text-align:left;padding:18px 20px;border-radius:16px;border:none;background:var(--c-blue);color:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:14px;min-height:64px;box-shadow:0 8px 24px rgba(0,149,208,.35);\">\n            <span style=\"flex:1;\"><span style=\"display:block;font-size:18px;font-weight:600;\">Commencer le jeu<\u002Fspan><span style=\"display:block;font-size:13.5px;color:rgba(255,255,255,.8);margin-top:2px;\">{{ caseTotal }} cas pratiques · les 12 acteurs<\u002Fspan><\u002Fspan>\n            <span style=\"font-size:20px;opacity:.9;\">→<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"text-align:center;font-size:12px;color:rgba(255,255,255,.45);margin-top:4px;\">Hiiato · Outil de formation<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== JEU : CAS PRATIQUES ===== -->\n    <sc-if value=\"{{ isCases }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Jeu cas pratiques\" style=\"flex:1;display:flex;flex-direction:column;min-height:0;position:relative;\">\n        <div style=\"flex:0 0 auto;padding:13px 16px;background:var(--c-card);border-bottom:1px solid var(--c-line);display:flex;align-items:center;gap:13px;\">\n          <div style=\"flex:1;display:flex;gap:4px;\">\n            <sc-for list=\"{{ segs }}\" as=\"sg\" hint-placeholder-count=\"12\">\n              <div style=\"flex:1;height:6px;border-radius:99px;transition:background .3s;{{ sg.css }}\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"flex:0 0 auto;display:flex;align-items:center;gap:7px;background:var(--c-paper);border:1px solid var(--c-line);border-radius:99px;padding:5px 12px;animation:{{ chipAnim }};\">\n            <span style=\"width:9px;height:9px;border-radius:99px;background:var(--c-blue);display:block;\"><\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:700;color:var(--c-text);\">{{ mobCount }}/12<\u002Fspan>\n            <span style=\"font-size:12px;color:var(--c-muted);\">mobilisés<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;overflow-y:auto;padding:16px 16px 24px;display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"animation:{{ cardAnim }};border-radius:20px;padding:14px;background:linear-gradient(158deg,#0d2a3c 0%,#0a1722 100%);color:#fff;box-shadow:0 12px 30px rgba(7,17,25,.25);\">\n            <image-slot id=\"scene-{{ caseId }}\" src=\"{{ caseSceneSrc }}\" shape=\"rounded\" radius=\"13\" placeholder=\"Illustration de la situation\" style=\"display:block;width:100%;height:140px;margin-bottom:14px;\"><\u002Fimage-slot>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 6px;\">\n              <span style=\"font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;color:var(--c-blue-light);background:rgba(37,204,246,.13);padding:5px 11px;border-radius:99px;\">{{ caseTag }}<\u002Fspan>\n              <span style=\"font-size:13px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.06em;\">{{ caseNumPad }} <span style=\"opacity:.45;\">/ {{ caseTotalPad }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0;padding:0 6px;font-size:17px;line-height:1.5;font-weight:500;color:#fff;\">{{ caseSituation }}<\u002Fp>\n          <\u002Fdiv>\n          <h2 style=\"margin:2px 0 0;font-size:18.5px;line-height:1.3;font-weight:700;color:var(--c-text);\">{{ caseQuestion }}<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ opt.onPick }}\" disabled=\"{{ opt.disabled }}\" style=\"width:100%;text-align:left;min-height:54px;padding:13px 15px;border-radius:14px;border:1.5px solid var(--c-line);background:var(--c-card);font-family:inherit;font-size:15px;color:var(--c-text);display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;{{ opt.cardCss }}\" style-active=\"transform:scale(.985);\">\n                <span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;{{ opt.badgeCss }}\">{{ opt.badgeLabel }}<\u002Fspan>\n                <span style=\"flex:1;\">{{ opt.text }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:40;max-height:82%;overflow-y:auto;background:var(--c-card);border-radius:24px 24px 0 0;box-shadow:0 -16px 44px rgba(7,17,25,.2);padding:22px;animation:sheetUp .34s cubic-bezier(.2,.85,.25,1) both;\">\n            <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:13px;\">\n              <span style=\"flex:0 0 auto;width:46px;height:46px;border-radius:99px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:23px;font-weight:700;{{ verdictIconCss }}\">{{ verdictIcon }}<\u002Fspan>\n              <span style=\"font-size:21px;font-weight:700;color:var(--c-text);\">{{ verdictTitle }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0 0 15px;font-size:14.5px;line-height:1.55;color:var(--c-text);\">{{ explainText }}<\u002Fp>\n            <button onclick=\"{{ openFicheCase }}\" style=\"width:100%;text-align:left;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:var(--c-paper);border:1px solid var(--c-line);margin-bottom:16px;cursor:pointer;font-family:inherit;animation:popBadge .46s cubic-bezier(.2,.85,.25,1) both;\">\n              <image-slot id=\"av-{{ caseActorId }}\" src=\"{{ caseActorSrc }}\" shape=\"circle\" placeholder=\"\" style=\"flex:0 0 auto;display:block;width:42px;height:42px;\"><\u002Fimage-slot>\n              <span style=\"flex:1;min-width:0;\"><span style=\"display:block;font-size:14.5px;font-weight:700;color:var(--c-text);\">{{ caseActorName }}<\u002Fspan><span style=\"display:block;font-size:12.5px;color:var(--c-muted);\">{{ caseActorFamily }}<\u002Fspan><\u002Fspan>\n              <span style=\"flex:0 0 auto;font-size:12.5px;color:var(--c-blue);font-weight:600;\">revoir la fiche ›<\u002Fspan>\n            <\u002Fbutton>\n            <button onclick=\"{{ nextCase }}\" style=\"width:100%;min-height:54px;border-radius:14px;border:none;background:var(--c-blue);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;\">{{ nextLabel }} →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== RECAP ===== -->\n    <sc-if value=\"{{ isRecap }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Récapitulatif\" style=\"flex:1;display:flex;flex-direction:column;min-height:0;\">\n        <div style=\"flex:1;overflow-y:auto;padding:32px 24px 24px;\">\n          <div style=\"font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--c-blue);font-weight:600;margin-bottom:10px;\">Parcours terminé<\u002Fdiv>\n          <h1 style=\"margin:0;font-size:27px;line-height:1.18;font-weight:700;color:var(--c-text);\">Vous avez mobilisé<br><span style=\"color:var(--c-blue);\">{{ mobCount }} {{ mobWord }} sur 12<\u002Fspan><\u002Fh1>\n          <p style=\"margin:13px 0 22px;font-size:15px;line-height:1.55;color:var(--c-muted);\">En bleu, les acteurs correctement identifiés. Touchez une fiche pour la revoir.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n            <sc-for list=\"{{ recapActors }}\" as=\"ra\" hint-placeholder-count=\"12\">\n              <button onclick=\"{{ ra.onOpen }}\" style=\"border:none;cursor:pointer;font-family:inherit;padding:13px 8px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:100px;{{ ra.css }}\">\n                <image-slot id=\"av-{{ ra.id }}\" src=\"{{ ra.src }}\" shape=\"circle\" placeholder=\"\" style=\"flex:0 0 auto;display:block;width:46px;height:46px;{{ ra.slotCss }}\"><\u002Fimage-slot>\n                <span style=\"font-size:12px;line-height:1.2;font-weight:600;text-align:center;\">{{ ra.name }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:0 0 auto;padding:16px;background:var(--c-card);border-top:1px solid var(--c-line);display:flex;flex-direction:column;gap:10px;\">\n          <button onclick=\"{{ goCases }}\" style=\"width:100%;min-height:52px;border-radius:14px;border:1.5px solid var(--c-blue);background:var(--c-card);color:var(--c-blue);font-family:inherit;font-size:15.5px;font-weight:600;cursor:pointer;\">Rejouer<\u002Fbutton>\n          <button onclick=\"{{ goHome }}\" style=\"width:100%;min-height:52px;border-radius:14px;border:none;background:var(--c-ink);color:#fff;font-family:inherit;font-size:15.5px;font-weight:600;cursor:pointer;\">Retour à l'accueil<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== FICHE ACTEUR ===== -->\n    <sc-if value=\"{{ ficheOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeFiche }}\" style=\"position:absolute;inset:0;z-index:60;background:rgba(7,17,25,.55);display:flex;align-items:flex-end;animation:overlayIn .2s ease;\">\n        <div onclick=\"{{ stop }}\" style=\"background:var(--c-card);width:100%;max-height:92%;border-radius:24px 24px 0 0;display:flex;flex-direction:column;animation:popIn .3s cubic-bezier(.2,.8,.2,1);\">\n          <div style=\"padding:10px 0 0;display:flex;justify-content:center;\"><div style=\"width:42px;height:5px;border-radius:99px;background:var(--c-line);\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:14px 24px 0;display:flex;align-items:center;gap:15px;\">\n            <image-slot id=\"av-{{ ficheId }}\" src=\"{{ ficheSrc }}\" shape=\"circle\" placeholder=\"Photo\" style=\"flex:0 0 auto;display:block;width:64px;height:64px;\"><\u002Fimage-slot>\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--c-muted);font-weight:700;\">{{ ficheFamily }}<\u002Fdiv>\n              <h2 style=\"margin:5px 0 0;font-size:22px;font-weight:700;color:var(--c-blue);line-height:1.14;\">{{ ficheName }}<\u002Fh2>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;\">\n            <div style=\"border-left:3px solid var(--c-blue);padding-left:15px;\">\n              <div style=\"font-size:12px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;color:var(--c-blue);margin-bottom:5px;\">Qui<\u002Fdiv>\n              <div style=\"font-size:15.5px;line-height:1.5;color:var(--c-text);\">{{ ficheWho }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-left:3px solid var(--c-blue);padding-left:15px;\">\n              <div style=\"font-size:12px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;color:var(--c-blue);margin-bottom:5px;\">Pouvoir ou levier<\u002Fdiv>\n              <div style=\"font-size:15.5px;line-height:1.5;color:var(--c-text);\">{{ ficheLever }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-left:3px solid var(--c-muted);padding-left:15px;\">\n              <div style=\"font-size:12px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;color:var(--c-muted);margin-bottom:5px;\">Ce qu'il ne fait pas<\u002Fdiv>\n              <div style=\"font-size:15.5px;line-height:1.5;color:var(--c-text);\">{{ ficheNot }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 24px 24px;border-top:1px solid var(--c-line);\">\n            <button onclick=\"{{ closeFiche }}\" style=\"width:100%;min-height:54px;border-radius:14px;border:none;background:var(--c-blue);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;\">Continuer<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:940}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: \"home\",   // home | cases | recap\n    caseIndex: 0,\n    answers: {},\n    openActorId: null\n  };\n\n  FAMILY = {\n    salarie: \"Terrain\", encadrant: \"Terrain\",\n    employeur: \"Pilotage interne\", cse: \"Pilotage interne\", sdc: \"Pilotage interne\", preventeur: \"Pilotage interne\",\n    medecin: \"Santé au travail\",\n    inspecteur: \"Contrôle et accompagnement externes\", carsat: \"Contrôle et accompagnement externes\",\n    orgtech: \"Contrôle et accompagnement externes\", inrs: \"Contrôle et accompagnement externes\", experts: \"Contrôle et accompagnement externes\"\n  };\n\n  // 12 fiches — contenu fourni, repris fidèlement.\n  ACTORS = {\n    salarie: { name: \"Salarié\",\n      who: `Chaque travailleur de l'entreprise.`,\n      lever: `Soumis au principe de prudence (article L. 4122-1) : « Conformément aux instructions qui lui sont données par l'employeur, dans les conditions prévues au règlement intérieur pour les entreprises tenues d'en élaborer un, il incombe à chaque travailleur de prendre soin, en fonction de sa formation et selon ses possibilités, de sa santé et de sa sécurité ainsi que de celles des autres personnes concernées par ses actes ou ses omissions au travail. » Il est le premier concerné par les conditions de travail, donc souvent le premier mobilisé, et constitue l'échelon de terrain incontournable : sans sa remontée d'information, la prévention reste théorique.`,\n      not: `Le principe de prudence ne transfère pas la responsabilité de l'employeur sur le salarié ; il s'agit d'une obligation complémentaire, pas d'un déplacement de charge.` },\n    encadrant: { name: \"Encadrant\",\n      who: `Le management de proximité ou intermédiaire.`,\n      lever: `Double rôle. D'une part, moteur de la prévention : il doit incarner l'exemplarité en matière de sécurité et impulser les politiques de prévention au sein de son équipe, tout en assurant la sécurité des salariés qu'il encadre. D'autre part, il est lui-même bénéficiaire de la politique de prévention, notamment en matière de RPS, ce qui explique l'importance accordée à sa propre formation (un encadrant non formé, ni sensibilisé, ni protégé ne peut pas porter la prévention auprès de son équipe).`,\n      not: `Il n'a pas le pouvoir de décision final de l'employeur (sauf délégation de pouvoir formalisée), mais reste l'interface quotidienne entre la politique de prévention et le terrain.` },\n    employeur: { name: \"Employeur\",\n      who: `Le détenteur du pouvoir de direction dans l'entreprise.`,\n      lever: `Il décide. Et parce qu'il décide, la responsabilité juridique de la santé et de la sécurité des salariés lui incombe en premier lieu : il est le premier concerné par les obligations SSCT du Code du travail. Toute la chaîne de prévention part de lui.`,\n      not: `Il ne peut pas se défausser de cette responsabilité sur un tiers (préventeur, salarié désigné compétent) : ces acteurs l'assistent, ils ne le substituent pas.` },\n    cse: { name: \"CSE / CSSCT\",\n      who: `L'instance représentative du personnel et sa commission spécialisée en santé, sécurité et conditions de travail.`,\n      lever: `Pas de pouvoir de décision direct, mais des attributions qui permettent de promouvoir la SSCT : droit d'alerte, inspections, enquêtes, consultations obligatoires, recours à l'expertise. Sa vraie force est sa capacité à mobiliser les autres acteurs (inspecteur du travail, CARSAT, médecin du travail) : c'est un acteur-levier plus qu'un acteur-décideur.`,\n      not: `Il ne se substitue pas à l'employeur dans la décision, et la CSSCT ne dispose pas de la personnalité juridique du CSE (elle ne peut pas agir en justice ni recourir seule à un expert).` },\n    sdc: { name: \"Salarié désigné compétent\",\n      who: `Le salarié que l'employeur a l'obligation de désigner en interne pour s'occuper des activités de protection et de prévention des risques professionnels (article L. 4644-1).`,\n      lever: `Sa désignation est soumise à consultation du CSE, et elle ouvre droit à une formation adaptée. Si l'entreprise ne dispose pas en interne des compétences nécessaires, l'employeur doit faire appel à un IPRP du service de santé au travail (s'il est externe) ou à un IPRP agréé par la DREETS.`,\n      not: `Sa désignation ne dispense pas l'employeur de consulter le CSE en amont.` },\n    preventeur: { name: \"Préventeur\",\n      who: `Salarié spécialisé en prévention des risques professionnels au sein de l'entreprise.`,\n      lever: `Soutien technique de l'employeur et du CSE. Il apporte une expertise interne mobilisable sans délai et sans coût externe.`,\n      not: `Il n'a pas de pouvoir de décision ni de pouvoir de contrôle ; il conseille et appuie, il ne sanctionne ni n'arbitre.` },\n    medecin: { name: \"Médecin du travail et son équipe\",\n      who: `Le médecin du travail et le service de prévention et de santé au travail (SPST) auquel il appartient.`,\n      lever: `Contrôle de l'état de santé des salariés lors des visites médicales, qu'elles soient obligatoires ou facultatives. Ce contrôle est de nature médicale, à bien distinguer du contrôle légal de l'inspecteur du travail. Le médecin dispose d'une équipe pluridisciplinaire (infirmier, interne en médecine, psychologue du travail, ergonome, addictologue) qui peut recevoir délégation pour certains actes, ou être mobilisée selon sa spécialité.`,\n      not: `Seul le médecin du travail peut se prononcer sur l'inaptitude : cette compétence ne peut jamais être déléguée à l'équipe pluridisciplinaire.` },\n    inspecteur: { name: \"Inspecteur du travail\",\n      who: `Agent de l'État chargé de veiller au respect du droit du travail dans l'entreprise.`,\n      lever: `Pouvoir de contrôle de la conformité de l'entreprise au Code du travail. Il dispose de pouvoirs généraux (contrôle, mise en demeure, sanction, conseil, information, autorisation) et de trois pouvoirs spéciaux : le prélèvement (direct ou à la charge de l'entreprise), l'arrêt temporaire d'activité, et la saisine du juge des référés pour ordonner des mesures.`,\n      not: `Son contrôle est un contrôle de conformité légale, à distinguer du contrôle du médecin du travail qui porte sur l'état de santé : les deux ne se substituent jamais l'un à l'autre (ex. : les compétences de l'inspecteur permettent d'apprécier la constitution d'un harcèlement, pas le médecin ; mais ce dernier peut analyser l'impact d'une situation sur la santé du salarié).` },\n    carsat: { name: \"Agent CARSAT / CRAMIF\",\n      who: `Agent de l'organisme de sécurité sociale en charge des risques professionnels (Caisse d'assurance retraite et de la santé au travail / Caisse régionale d'assurance maladie d'Île-de-France).`,\n      lever: `Rôle centré sur l'accompagnement et le conseil, même s'il peut prononcer certaines amendes administratives (cotisations supplémentaires, injonctions) ou ordonner à l'employeur d'adopter un plan de prévention. La CARSAT peut également financer de l'accompagnement ou des mesures de prévention (aides financières, contrats de prévention), ce qui en fait un acteur-ressource autant qu'un acteur de contrôle. De plus, ces agents peuvent réaliser des contrôles métrologiques dans les conditions prévues par le Code du travail (contrairement aux organismes techniques qui peuvent parfois ne pas contrôler selon le référentiel).`,\n      not: `Sa logique reste assurantielle et incitative, contrairement à l'inspection du travail dont la logique est avant tout répressive et de conformité légale.` },\n    orgtech: { name: \"Organisme technique\",\n      who: `Prestataire externe spécialisé dans l'accompagnement à la prévention.`,\n      lever: `Intervient contre rémunération pour aider les entreprises à mettre en place ou actualiser leur DUERP, contrôler certaines conditions de travail (bruit, éclairage, qualité de l'air, etc.), ou apporter du conseil (consulting).`,\n      not: `Il n'a aucun pouvoir de contrôle légal ni de sanction : son intervention reste contractuelle, à la demande de l'entreprise.` },\n    inrs: { name: \"INRS / ANACT\",\n      who: `Deux organismes scientifiques et techniques nationaux de référence en santé et conditions de travail.`,\n      lever: `Production de ressources (articles, brochures, outils) et de formations. L'INRS se positionne plutôt sur le volet réglementaire et la prévention des risques, l'ANACT plutôt sur l'amélioration des conditions de travail au sens large.`,\n      not: `Ni l'un ni l'autre n'intervient directement dans l'entreprise avec un pouvoir de contrôle ou de décision : ce sont des centres de ressources, pas des organes d'intervention.` },\n    experts: { name: \"Experts CSE\",\n      who: `Les différents experts que le CSE peut solliciter pour l'accompagner (formateur, juriste, avocat, expert agréé CSE, syndicat, etc.).`,\n      lever: `Apportent un appui technique et juridique au CSE dans l'exercice de ses attributions en matière de prévention, notamment lors de consultations complexes (orientations stratégiques, projets importants, risque grave).`,\n      not: `L'expert assiste le CSE, il ne se substitue pas à lui dans la prise de position ni dans le vote des résolutions.` }\n  };\n\n  // 12 cas — un par acteur (chaque acteur mobilisé une fois). Choix = acteurs.\n  CASES = [\n    { id: \"c1\", actor: \"salarie\", tag: \"Danger grave et imminent\",\n      situation: `Une fuite de produit dangereux se répand près d'un poste de travail : la personne qui y travaille a un motif raisonnable de penser que sa situation présente un danger grave et imminent.`,\n      question: `Quel acteur peut se retirer immédiatement de la situation ?`,\n      options: [\n        { actor: \"salarie\", correct: true },\n        { actor: \"encadrant\", correct: false },\n        { actor: \"medecin\", correct: false },\n        { actor: \"cse\", correct: false }\n      ],\n      explain: `Le salarié dispose d'un droit de retrait individuel et immédiat face à un danger grave et imminent : il se retire et signale la situation, sans attendre de validation. Ce principe de prudence ne transfère pas pour autant la responsabilité de l'employeur.` },\n    { id: \"c2\", actor: \"encadrant\", tag: \"Risque chimique\",\n      situation: `Un salarié remarque que le DUERP ne mentionne pas un risque chimique pourtant présent sur son poste depuis une récente évolution de process.`,\n      question: `Qui alertez-vous en premier ?`,\n      options: [\n        { actor: \"encadrant\", correct: true },\n        { actor: \"inspecteur\", correct: false },\n        { actor: \"carsat\", correct: false },\n        { actor: \"inrs\", correct: false }\n      ],\n      explain: `Encadrant direct (ou via le CSE si le salarié n'est pas représentant) : l'échelon de terrain le plus rapide et le plus légitime pour faire remonter une anomalie ; il pourra la transmettre au préventeur ou au salarié désigné compétent pour mettre à jour le DUERP. L'inspecteur du travail et la CARSAT interviennent en cas d'inaction ou de désaccord persistant, pas en première intention.` },\n    { id: \"c3\", actor: \"employeur\", tag: \"Responsabilité\",\n      situation: `Un nouveau procédé industriel est mis en place. Il faut arrêter la politique de prévention associée et débloquer les moyens nécessaires (équipements, formation, organisation).`,\n      question: `À qui incombe en premier lieu cette responsabilité ?`,\n      options: [\n        { actor: \"preventeur\", correct: false },\n        { actor: \"employeur\", correct: true },\n        { actor: \"cse\", correct: false },\n        { actor: \"inspecteur\", correct: false }\n      ],\n      explain: `L'employeur détient le pouvoir de direction : la responsabilité juridique de la santé et de la sécurité lui incombe en premier lieu, et toute la chaîne de prévention part de lui. Il ne peut pas s'en défausser sur le préventeur ou le salarié désigné compétent, qui l'assistent sans le substituer.` },\n    { id: \"c4\", actor: \"cse\", tag: \"Désignation\",\n      situation: `L'employeur annonce en réunion qu'il va désigner un salarié compétent en prévention, sans en avoir parlé au préalable avec le CSE.`,\n      question: `Quelle est l'irrégularité, et qui doit intervenir ?`,\n      options: [\n        { actor: \"employeur\", correct: false, label: \"Rien d'irrégulier, c'est une prérogative de l'employeur\" },\n        { actor: \"cse\", correct: true, label: \"Le CSE doit être consulté avant la désignation\" },\n        { actor: \"inspecteur\", correct: false, label: \"L'inspecteur du travail doit valider la désignation\" },\n        { actor: \"medecin\", correct: false, label: \"Le médecin du travail doit donner son accord\" }\n      ],\n      explain: `Le CSE doit être consulté avant la désignation (article L. 4644-1) : une consultation obligatoire, pas une simple information. Ni l'inspecteur du travail ni le médecin du travail n'interviennent dans le processus de désignation lui-même.` },\n    { id: \"c5\", actor: \"sdc\", tag: \"Organisation interne\",\n      situation: `L'entreprise doit organiser en interne les activités de protection et de prévention des risques professionnels et confier cette mission à un salarié formé (article L. 4644-1).`,\n      question: `Quel acteur l'employeur doit-il désigner en priorité ?`,\n      options: [\n        { actor: \"sdc\", correct: true },\n        { actor: \"orgtech\", correct: false },\n        { actor: \"inspecteur\", correct: false },\n        { actor: \"medecin\", correct: false }\n      ],\n      explain: `L'employeur a l'obligation de désigner un salarié désigné compétent en interne (après consultation du CSE), avec une formation adaptée. À défaut de compétences internes, il fait appel à un IPRP du service de santé au travail ou agréé par la DREETS.` },\n    { id: \"c6\", actor: \"preventeur\", tag: \"Appui interne\",\n      situation: `L'employeur et le CSE veulent un appui technique interne, mobilisable rapidement et sans coût externe, pour structurer la démarche de prévention et le DUERP.`,\n      question: `Quel acteur interne solliciter ?`,\n      options: [\n        { actor: \"orgtech\", correct: false },\n        { actor: \"preventeur\", correct: true },\n        { actor: \"inrs\", correct: false },\n        { actor: \"carsat\", correct: false }\n      ],\n      explain: `Le préventeur apporte une expertise interne mobilisable sans délai et sans coût externe, en soutien de l'employeur et du CSE. Il conseille et appuie, sans pouvoir de décision ni de contrôle.` },\n    { id: \"c7\", actor: \"medecin\", tag: \"Épuisement professionnel\",\n      situation: `Un encadrant remarque qu'un membre de son équipe montre des signes répétés d'épuisement (fatigue visible, erreurs inhabituelles, isolement).`,\n      question: `Vers quel acteur l'encadrant doit-il orienter en priorité ?`,\n      options: [\n        { actor: \"medecin\", correct: true },\n        { actor: \"inspecteur\", correct: false },\n        { actor: \"carsat\", correct: false },\n        { actor: \"experts\", correct: false }\n      ],\n      explain: `Orienter vers le médecin du travail ou son équipe (notamment le psychologue du travail s'il y en a un) : c'est un sujet de santé, donc le bon canal est le SPST, pas le contrôle légal. L'encadrant a un rôle de vigilance et d'alerte, dans la limite de ses compétences.` },\n    { id: \"c8\", actor: \"inspecteur\", tag: \"Mise en demeure\",\n      situation: `Une machine est non conforme car dépourvue de dispositif de protection. Un danger grave et imminent est constaté, mais aucun salarié n'exerce son droit de retrait.`,\n      question: `Quel acteur peut arrêter l'activité ?`,\n      options: [\n        { actor: \"inspecteur\", correct: true },\n        { actor: \"carsat\", correct: false },\n        { actor: \"orgtech\", correct: false },\n        { actor: \"employeur\", correct: false }\n      ],\n      explain: `L'inspecteur du travail peut mobiliser l'arrêt temporaire d'activité, l'un de ses trois pouvoirs spéciaux. Il n'a pas le pouvoir de prononcer une fermeture définitive ni de sanctionner individuellement un salarié : ce sont des prérogatives distinctes (judiciaires ou disciplinaires).` },\n    { id: \"c9\", actor: \"carsat\", tag: \"Financement\",\n      situation: `Le CSE souhaite que l'entreprise investisse dans du matériel d'aide à la manutention, mais le budget semble bloquer le projet.`,\n      question: `Quel acteur externe peut potentiellement financer une partie de la mesure ?`,\n      options: [\n        { actor: \"carsat\", correct: true },\n        { actor: \"inspecteur\", correct: false },\n        { actor: \"inrs\", correct: false },\n        { actor: \"orgtech\", correct: false }\n      ],\n      explain: `L'agent CARSAT / CRAMIF peut financer de l'accompagnement ou des mesures de prévention via des aides financières ou des contrats de prévention. L'INRS produit des ressources mais ne finance pas directement ; l'inspecteur du travail contrôle, il ne finance pas.` },\n    { id: \"c10\", actor: \"orgtech\", tag: \"Mesure du bruit\",\n      situation: `Plusieurs salariés se plaignent d'un niveau sonore élevé sur une ligne de production, sans que personne n'ait de mesure précise.`,\n      question: `Qui peut réaliser une mesure technique fiable du bruit ?`,\n      options: [\n        { actor: \"orgtech\", correct: true },\n        { actor: \"encadrant\", correct: false },\n        { actor: \"sdc\", correct: false },\n        { actor: \"preventeur\", correct: false },\n        { actor: \"carsat\", correct: false }\n      ],\n      explain: `L'organisme technique dispose des outils et de la qualification pour réaliser des mesures techniques précises (bruit, éclairage, qualité de l'air). Le préventeur et le salarié désigné compétent peuvent solliciter cette mesure et l'exploiter, mais n'ont généralement pas l'instrumentation et la certification nécessaires.` },\n    { id: \"c11\", actor: \"inrs\", tag: \"Ressources RPS\",\n      situation: `Le CSSCT souhaite construire une action de sensibilisation aux RPS et cherche des outils méthodologiques fiables.`,\n      question: `Vers quel organisme de ressources se tourner en priorité ?`,\n      options: [\n        { actor: \"inrs\", correct: true, label: \"ANACT\" },\n        { actor: \"inspecteur\", correct: false },\n        { actor: \"carsat\", correct: false },\n        { actor: \"orgtech\", correct: false }\n      ],\n      explain: `L'ANACT a une vocation spécifique d'amélioration des conditions de travail, RPS compris, avec des outils et méthodologies disponibles gratuitement. L'INRS aurait aussi pu convenir (registre plus réglementaire), mais l'ANACT est la réponse la plus directement adaptée.` },\n    { id: \"c12\", actor: \"experts\", tag: \"Orientations stratégiques\",\n      situation: `L'entreprise annonce une réorganisation majeure avec un risque de fermeture de site. Le CSE veut comprendre les enjeux financiers et industriels avant de rendre son avis.`,\n      question: `Quel acteur le CSE peut-il mobiliser ?`,\n      options: [\n        { actor: \"experts\", correct: true },\n        { actor: \"medecin\", correct: false },\n        { actor: \"orgtech\", correct: false },\n        { actor: \"carsat\", correct: false }\n      ],\n      explain: `L'expert CSE (expert agréé), dans le cadre du droit à l'expertise sur les orientations stratégiques. Le médecin du travail et la CARSAT n'ont pas vocation à analyser des données financières et industrielles : leur champ est la santé et la prévention des risques professionnels.` }\n  ];\n\n  goHome = () => this.setState({ screen: \"home\", openActorId: null });\n  goCases = () => this.setState({ screen: \"cases\", caseIndex: 0, answers: {}, openActorId: null });\n  openFiche = (id) => this.setState({ openActorId: id });\n  closeFiche = () => this.setState({ openActorId: null });\n  stop = (e) => { e.stopPropagation(); };\n\n  pick = (i) => {\n    const ci = this.state.caseIndex;\n    if (this.state.answers[ci] !== undefined) return;\n    const correct = this.CASES[ci].actor; // ouvre automatiquement la fiche du bon acteur (lecture)\n    this.setState(s => ({ answers: { ...s.answers, [ci]: i }, openActorId: correct }));\n  };\n  nextCase = () => {\n    const ci = this.state.caseIndex;\n    if (ci >= this.CASES.length - 1) this.setState({ screen: \"recap\", openActorId: null });\n    else this.setState({ caseIndex: ci + 1, openActorId: null });\n  };\n\n  renderVals() {\n    const S = this.state;\n    const A = this.ACTORS;\n\n    const ci = S.caseIndex;\n    const cs = this.CASES[ci];\n    const choice = S.answers[ci];\n    const answered = choice !== undefined;\n    const correctChosen = answered && cs.options[choice].correct;\n    const LETTERS = [\"A\", \"B\", \"C\", \"D\", \"E\"];\n    const options = cs.options.map((o, i) => {\n      const label = o.label || A[o.actor].name;\n      let cardCss = \"\", badgeCss = \"background:var(--c-blue);color:#fff;\", badgeLabel = LETTERS[i];\n      if (answered) {\n        cardCss = \"cursor:default;\";\n        if (o.correct) { cardCss += \"background:var(--c-good-bg);border-color:var(--c-good);\"; badgeCss = \"background:var(--c-good);color:#fff;\"; badgeLabel = \"\\u2713\"; }\n        else if (i === choice) { cardCss += \"background:var(--c-alt-bg);border-color:var(--c-alt);\"; badgeCss = \"background:var(--c-alt);color:#fff;\"; badgeLabel = \"\\u2715\"; }\n        else { cardCss += \"opacity:.4;\"; }\n      }\n      return { text: label, cardCss, badgeCss, badgeLabel, disabled: answered, onPick: () => this.pick(i) };\n    });\n    const caseActor = A[cs.actor];\n\n    const goodIds = new Set(\n      Object.keys(S.answers).filter(k => this.CASES[+k].options[S.answers[k]].correct).map(k => this.CASES[+k].actor)\n    );\n\n    const fa = S.openActorId ? A[S.openActorId] : null;\n\n    const IMG = (typeof window !== \"undefined\" && window.ACTOR_IMAGES) || {};\n\n    const recapActors = Object.keys(A).map(key => {\n      const on = goodIds.has(key);\n      return {\n        id: key, name: A[key].name, src: IMG[\"av-\" + key] || \"\",\n        css: on ? \"background:var(--c-blue);color:#fff;\" : \"background:var(--c-line);color:var(--c-muted);\",\n        slotCss: on ? \"box-shadow:0 0 0 2px rgba(255,255,255,.6);\" : \"opacity:.5;\",\n        onOpen: () => this.openFiche(key)\n      };\n    });\n\n    return {\n      isHome: S.screen === \"home\",\n      isCases: S.screen === \"cases\",\n      isRecap: S.screen === \"recap\",\n      showChrome: S.screen !== \"home\",\n      chromeTitle: S.screen === \"cases\" ? \"Cas pratiques\" : \"Récapitulatif\",\n      goHome: this.goHome, goCases: this.goCases,\n\n      caseTotal: this.CASES.length,\n      mobCount: goodIds.size,\n      mobWord: goodIds.size > 1 ? \"acteurs\" : \"acteur\",\n\n      caseId: cs.id,\n      caseNumPad: String(ci + 1).padStart(2, \"0\"),\n      caseTotalPad: String(this.CASES.length).padStart(2, \"0\"),\n      caseTag: cs.tag, caseSituation: cs.situation, caseQuestion: cs.question,\n      caseActorId: cs.actor, caseActorName: caseActor.name, caseActorFamily: this.FAMILY[cs.actor],\n      homeHeroSrc: IMG[\"home-hero\"] || \"\",\n      caseSceneSrc: IMG[\"scene-\" + cs.id] || \"\",\n      caseActorSrc: IMG[\"av-\" + cs.actor] || \"\",\n      cardAnim: (ci % 2 === 0 ? \"cardIn1\" : \"cardIn2\") + \" .4s cubic-bezier(.2,.8,.2,1) both\",\n      segs: this.CASES.map((_, i) => ({\n        css: (i < ci || (i === ci && answered)) ? \"background:var(--c-blue);\"\n            : (i === ci ? \"background:var(--c-blue-light);\" : \"background:var(--c-line);\")\n      })),\n      options, answered,\n      verdictIcon: correctChosen ? \"\\u2713\" : \"\\u21BA\",\n      verdictIconCss: correctChosen ? \"background:var(--c-good);\" : \"background:var(--c-alt);\",\n      verdictTitle: correctChosen ? \"Bien vu !\" : \"Pas tout à fait\",\n      explainText: cs.explain,\n      chipAnim: (goodIds.size % 2 === 0 ? \"countPulseA\" : \"countPulseB\") + \" .45s ease\",\n      nextLabel: ci >= this.CASES.length - 1 ? \"Voir le récapitulatif\" : \"Situation suivante\",\n      nextCase: this.nextCase,\n      openFicheCase: () => this.openFiche(cs.actor),\n\n      ficheOpen: !!fa,\n      ficheId: S.openActorId || \"\",\n      ficheSrc: (S.openActorId && IMG[\"av-\" + S.openActorId]) || \"\",\n      ficheName: fa ? fa.name : \"\",\n      ficheFamily: fa ? this.FAMILY[S.openActorId] : \"\",\n      ficheWho: fa ? fa.who : \"\",\n      ficheLever: fa ? fa.lever : \"\",\n      ficheNot: fa ? fa.not : \"\",\n      closeFiche: this.closeFiche, stop: this.stop,\n\n      recapActors\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

</html>
