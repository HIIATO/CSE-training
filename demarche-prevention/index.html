<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a1722">
<title>La démarche de prévention</title>
<meta name="description" content="Jeu de formation CSE / SSCT : vivre la démarche de prévention des risques professionnels, du découpage en unités de travail au choix d'une mesure.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prévention">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icone.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icone-192.png">
<link rel="preload" as="font" type="font/woff2" href="fonts/figtree-latin.woff2" crossorigin>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div class="tel" id="tel">

    <!-- Barre du haut (masquee sur l'accueil) -->
    <header class="chrome" id="chrome" hidden>
      <button class="chrome-retour" id="btn-retour" aria-label="Retour">&lsaquo;</button>
      <span class="chrome-titre" id="chrome-titre"></span>
      <button class="chrome-carnet" id="btn-carnet" aria-label="Ouvrir le carnet DUERP">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 3.5h9l4 4V20a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 20V5A1.5 1.5 0 0 1 6.5 3.5Z"/>
          <path d="M14.5 3.5V8H19"/>
          <path d="M8.5 12.5h7M8.5 16.5h4.5"/>
        </svg>
        <span class="pastille" id="carnet-pastille" hidden>0</span>
      </button>
    </header>

    <!-- Barre de progression des etapes -->
    <div class="etapes" id="etapes" hidden></div>

    <!-- Zone d'ecran : un seul ecran affiche a la fois -->
    <main class="vue" id="vue"></main>

    <!-- Carnet DUERP (panneau repliable) -->
    <div class="voile" id="voile" hidden></div>
    <section class="carnet" id="carnet" hidden aria-label="Carnet DUERP">
      <div class="poignee"></div>
      <div class="carnet-tete">
        <div>
          <div class="sur-titre">Document unique</div>
          <h2 class="carnet-titre">Mon DUERP</h2>
        </div>
        <span class="compteur" id="carnet-compteur">0 risque</span>
      </div>
      <div class="carnet-corps" id="carnet-corps"></div>
      <div class="carnet-pied">
        <button class="btn btn-primaire" id="btn-fermer-carnet">Continuer</button>
      </div>
    </section>

    <!-- Notifications discretes -->
    <div class="toast" id="toast" hidden></div>

  </div>
</div>

<script src="js/etat.js"></script>
<script src="js/ui.js"></script>
<script src="js/cartes.js"></script>
<script src="js/carnet.js"></script>
<script src="js/app.js"></script>
<script>
/* Mise en cache pour le jeu hors connexion. Sans effet si la page est ouverte
   directement depuis le disque (file://) : c'est normal. */
if('serviceWorker' in navigator && location.protocol.indexOf('http') === 0){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){
      console.warn('Cache hors connexion indisponible :', e.message);
    });
  });
}
</script>
</body>
</html>
